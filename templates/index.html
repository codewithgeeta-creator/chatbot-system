<!DOCTYPE html>
<html>
<head>
<title>AI College Chatbot</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { margin:0; font-family:Arial; background:#343541; color:white; }
.header { padding:15px; background:#202123; text-align:center; }

#chatbox {
    height:70vh; overflow-y:auto; padding:20px;
    display:flex; flex-direction:column;
}

.message { display:flex; margin:10px 0; }
.user { justify-content:flex-end; }
.bot { justify-content:flex-start; }

.bubble {
    max-width:70%; padding:12px;
    border-radius:10px;
    white-space:pre-wrap;
}

.user .bubble { background:#19c37d; color:black; }
.bot .bubble { background:#444654; }

#quickButtons {
    display:flex; flex-wrap:wrap;
    justify-content:center; gap:10px; padding:10px;
}

#quickButtons button {
    background:#444654; color:white;
    border:none; padding:8px 12px;
    border-radius:20px; cursor:pointer;
}

#inputArea {
    position:fixed; bottom:0;
    width:100%; background:#40414f;
    padding:10px; display:flex;
}

input {
    flex:1; padding:10px;
    border-radius:8px; border:none;
}

button {
    margin-left:5px; padding:10px;
    border:none; border-radius:8px;
    background:#19c37d;
}

canvas {
    display:none;
    margin:20px auto;
    max-width:700px;
}
</style>
</head>

<body>

<div class="header">🤖 AI College Chatbot</div>

<div id="chatbox"></div>

<div id="quickButtons">
<button onclick="quickSend('courses')">📚 Courses</button>
<button onclick="quickSend('placement')">📊 Placement</button>
<button onclick="quickSend('fees')">💰 Fees</button>
<button onclick="showBarChart()">📊 Bar</button>
<button onclick="showPieChart()">🥧 Pie</button>
</div>

<canvas id="chartCanvas"></canvas>

<div id="inputArea">
<input id="text" placeholder="Type message..." onkeypress="handleKey(event)">
<button onclick="sendMessage()">➤</button>
<button onclick="clearChat()">🗑️</button>
</div>

<script>

function addMessage(message, sender) {
    let chatbox = document.getElementById("chatbox");

    let msg = document.createElement("div");
    msg.classList.add("message", sender);

    let bubble = document.createElement("div");
    bubble.classList.add("bubble");

    msg.appendChild(bubble);
    chatbox.appendChild(msg);

    typeEffect(bubble, message);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function typeEffect(el, text) {
    el.innerHTML = "";
    let i = 0;
    function typing() {
        if (i < text.length) {
            el.innerHTML += text.charAt(i);
            i++;
            setTimeout(typing, 10);
        }
    }
    typing();
}

function sendMessage() {
    let input = document.getElementById("text");
    let msg = input.value;
    if (!msg) return;

    addMessage(msg, "user");
    input.value = "";

    fetch("/get", {
        method:"POST",
        body:"msg="+msg,
        headers:{ "Content-Type":"application/x-www-form-urlencoded" }
    })
    .then(res=>res.text())
    .then(data=>addMessage(data,"bot"));
}

function quickSend(text) {
    document.getElementById("text").value = text;
    sendMessage();
}

function clearChat() {
    document.getElementById("chatbox").innerHTML="";
}

function handleKey(e) {
    if (e.key==="Enter") sendMessage();
}

/* CHART */

let chart;

function getData(){
    return {
        labels:["Cloud Built","Basant","Ocean","Inner Circle","NxtSync","Planet"],
        data:[20,23,3,9,1,1]
    }
}

function showBarChart(){
    let c=document.getElementById("chartCanvas");
    c.style.display="block";
    let ctx=c.getContext("2d");

    if(chart) chart.destroy();

    let d=getData();

    chart=new Chart(ctx,{
        type:"bar",
        data:{
            labels:d.labels,
            datasets:[{data:d.data}]
        }
    });
}

function showPieChart(){
    let c=document.getElementById("chartCanvas");
    c.style.display="block";
    let ctx=c.getContext("2d");

    if(chart) chart.destroy();

    let d=getData();

    chart=new Chart(ctx,{
        type:"pie",
        data:{
            labels:d.labels,
            datasets:[{data:d.data}]
        }
    });
}

</script>

</body>
</html>
