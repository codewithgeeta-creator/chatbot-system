<!DOCTYPE html>
<html>
<head>
<title>AI College Chatbot</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #343541;
    color: white;
}

.header {
    padding: 15px;
    background: #202123;
    text-align: center;
}

#chatbox {
    height: 70vh;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
}

.message {
    display: flex;
    margin: 10px 0;
}

.user { justify-content: flex-end; }
.bot { justify-content: flex-start; }

.bubble {
    max-width: 70%;
    padding: 12px;
    border-radius: 10px;
    white-space: pre-wrap;
}

.user .bubble {
    background: #19c37d;
    color: black;
}

.bot .bubble {
    background: #444654;
}

/* QUICK BUTTONS */
#quickButtons {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 10px;
    flex-wrap: wrap;
    background: #343541;
}

#quickButtons button {
    background: #444654;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 20px;
    cursor: pointer;
}

#quickButtons button:hover {
    background: #19c37d;
    color: black;
}

/* INPUT AREA */
#inputArea {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #40414f;
    padding: 10px;
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #19c37d;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="header">🤖 AI College Chatbot</div>

<div id="chatbox">
    <div class="message bot">
        <div class="bubble">Hello! Ask me anything 😊</div>
    </div>
</div>

<!-- QUICK BUTTONS -->
<div id="quickButtons">
    <button onclick="quickSend('fees')">💰 Fees</button>
    <button onclick="quickSend('placement details')">📊 Placements</button>
    <button onclick="quickSend('courses')">📚 Courses</button>
    <button onclick="quickSend('admission')">🎓 Admission</button>
</div>

<!-- INPUT AREA -->
<div id="inputArea">
    <input id="text" type="text" placeholder="Send a message..." onkeypress="handleKey(event)">
    <button onclick="sendMessage()">➤</button>
    <button onclick="speakLast()">🔊</button>
    <button onclick="stopVoice()">⛔</button>
    <button onclick="clearChat()">🗑️</button>
</div>

<script>

// Add message
function addMessage(message, sender) {
    let chatbox = document.getElementById("chatbox");

    let msgDiv = document.createElement("div");
    msgDiv.classList.add("message", sender);

    let bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.innerText = message;

    msgDiv.appendChild(bubble);
    chatbox.appendChild(msgDiv);

    chatbox.scrollTop = chatbox.scrollHeight;

    return bubble;
}

// Typing effect
function typeEffect(element, text) {
    let i = 0;
    element.innerText = "";

    function typing() {
        if (i < text.length) {
            element.innerText += text.charAt(i);
            i++;
            setTimeout(typing, 10);
        }
    }
    typing();
}

// Send message
function sendMessage() {
    let input = document.getElementById("text");
    let message = input.value;

    if (message.trim() === "") return;

    addMessage(message, "user");
    input.value = "";

    let typingBubble = addMessage("Typing...", "bot");

    fetch("/get", {
        method: "POST",
        body: "msg=" + encodeURIComponent(message),
        headers: { "Content-Type": "application/x-www-form-urlencoded" }
    })
    .then(res => res.text())
    .then(data => {
        typeEffect(typingBubble, data);
        window.lastResponse = data;
    });
}

// QUICK BUTTON CLICK
function quickSend(text) {
    document.getElementById("text").value = text;
    sendMessage();
}

// Voice
function speakText(text) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-IN";
    window.speechSynthesis.speak(speech);
}

function speakLast() {
    if (window.lastResponse) {
        speakText(window.lastResponse);
    }
}

// Stop voice
function stopVoice() {
    window.speechSynthesis.cancel();
}

// Clear chat
function clearChat() {
    let chatbox = document.getElementById("chatbox");
    chatbox.innerHTML = "";
    addMessage("Chat cleared. Ask me anything 😊", "bot");
    stopVoice();
}

// Enter key
function handleKey(event) {
    if (event.key === "Enter") {
        sendMessage();
    }
}

</script>

</body>
</html>
