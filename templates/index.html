<!DOCTYPE html>
<html>
<head>
    <title>AI College Chatbot</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial;
            background-color: #343541;
            color: white;
        }

        h1 {
            text-align: center;
            padding: 15px;
            margin: 0;
            background: #202123;
        }

        #chatbox {
            height: 75vh;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .message {
            max-width: 70%;
            padding: 12px;
            margin: 8px;
            border-radius: 10px;
            line-height: 1.4;
        }

        .user {
            align-self: flex-end;
            background-color: #10a37f;
            color: white;
        }

        .bot {
            align-self: flex-start;
            background-color: #444654;
        }

        #inputArea {
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            padding: 10px;
            background: #202123;
        }

        #text {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 16px;
        }

        button {
            margin-left: 8px;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #10a37f;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #0d8f6a;
        }
    </style>
</head>

<body>

<h1>🤖 AI College Chatbot</h1>

<div id="chatbox">
    <div class="message bot">Hello! Ask me anything about the college 😊</div>
</div>

<div id="inputArea">
    <input id="text" type="text" placeholder="Type your message...">
    <button onclick="sendMessage()">Send</button>
    <button onclick="startVoice()">🎤</button>
</div>

<script>
function addMessage(message, sender) {
    let chatbox = document.getElementById("chatbox");

    let div = document.createElement("div");
    div.classList.add("message", sender);
    div.innerText = message;

    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function detectLanguage(text) {
    // Kannada Unicode range
    if (/[\u0C80-\u0CFF]/.test(text)) return "kn-IN";

    // Hindi (Devanagari)
    if (/[\u0900-\u097F]/.test(text)) return "hi-IN";

    // Telugu Unicode range
    if (/[\u0C00-\u0C7F]/.test(text)) return "te-IN";

    // Default English
    return "en-IN";
}

    function sendMessage() {
    let input = document.getElementById("text");
    let message = input.value;

    if (message.trim() === "") return;

    addMessage(message, "user");

    fetch("/get", {
        method: "POST",
        body: JSON.stringify({message: message}),
        headers: {"Content-Type": "application/json"}
    })
    .then(res => res.json())
    .then(data => {
        addMessage(data.reply, "bot");

        let lang = detectLanguage(message);
        speak(data.reply, lang);
    });

    input.value = "";
}

// 🎤 Voice input
function startVoice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-IN";
    recognition.start();

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById("text").value = text;
        sendMessage();
    };
}

// 🔊 Voice output
function speak(text, lang) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = lang;
    window.speechSynthesis.speak(speech);
}
</script>

</body>
</html>
