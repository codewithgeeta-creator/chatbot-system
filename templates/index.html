<!DOCTYPE html>
<html>
<head>
    <title>College AI Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background-color: #6f8fb1;
            text-align: center;
        }

        #chatbox {
            width: 80%;
            height: 400px;
            margin: auto;
            background: white;
            overflow-y: auto;
            padding: 10px;
            border-radius: 10px;
        }

        .user {
            text-align: right;
            background: #007bff;
            color: white;
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
            display: inline-block;
            max-width: 60%;
        }

        .bot {
            text-align: left;
            background: #e5e5e5;
            padding: 8px;
            margin: 5px;
            border-radius: 10px;
            display: inline-block;
            max-width: 60%;
        }

        input {
            width: 60%;
            padding: 10px;
        }

        button {
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>🎓 College AI Chatbot</h2>

<div id="chatbox"></div>

<input id="text" type="text" placeholder="Ask anything...">
<button onclick="sendMessage()">Send</button>

<script>
function sendMessage() {
    let userText = document.getElementById("text").value;

    if (userText.trim() === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += `<div class="user">${userText}</div><br>`;

    fetch("/get", {
        method: "POST",
        body: new URLSearchParams({msg: userText}),
        headers: {"Content-Type": "application/x-www-form-urlencoded"}
    })
    .then(res => res.text())
    .then(data => {
        chatbox.innerHTML += `<div class="bot">${data}</div><br>`;
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    document.getElementById("text").value = "";
}
</script>

</body>
</html>
