<script>
function addMessage(message, sender) {
    let chatbox = document.getElementById("chatbox");

    let div = document.createElement("div");
    div.className = sender;
    div.innerText = message;

    chatbox.appendChild(div);
    chatbox.scrollTop = chatbox.scrollHeight;
}

function detectLanguage(text) {
    if (/[ಅ-ಹ]/.test(text)) return "kn-IN";   // Kannada
    if (/[अ-ह]/.test(text)) return "hi-IN";   // Hindi
    if (/[అ-హ]/.test(text)) return "te-IN";   // Telugu
    return "en-IN";                           // English
}

function sendMessage() {
    let input = document.getElementById("text");
    let message = input.value;

    if (message.trim() === "") return;

    addMessage(message, "user");

    fetch("/get", {
        method: "POST",
        body: JSON.stringify({message: message}),
        headers: {"Content-Type": "application/json"}
    })
    .then(response => response.json())
    .then(data => {
        addMessage(data.reply, "bot");

        // 🔊 Speak in detected language
        let lang = detectLanguage(message);
        speak(data.reply, lang);
    });

    input.value = "";
}

// 🎤 Voice input
function startVoice() {
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    recognition.lang = "en-IN"; // auto works okay for demo
    recognition.start();

    recognition.onresult = function(event) {
        let text = event.results[0][0].transcript;
        document.getElementById("text").value = text;
        sendMessage();
    };

    recognition.onerror = function() {
        alert("Voice error, try again");
    };
}

// 🔊 Voice output
function speak(text, lang) {
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = lang;
    window.speechSynthesis.speak(speech);
}
</script>
